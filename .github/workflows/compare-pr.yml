name: Compare Pull Request Manifests

on:
  workflow_call:
    inputs:
      manifest-path:
        description: Path within the repository to compare. Use . to discover manifests everywhere.
        required: false
        type: string
        default: .
      output:
        description: "Report format: table, json, or yaml."
        required: false
        type: string
        default: table
      comment:
        description: Create or update a pull request comment when deployment changes are found.
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  pull-requests: write

jobs:
  compare:
    name: Compare Kubernetes manifests
    runs-on: ubuntu-latest

    steps:
      - name: Check out pull request base
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: before

      - name: Check out pull request head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: after

      - name: Collect changed Kubernetes manifest candidates
        id: scope
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MANIFEST_PATH: ${{ inputs.manifest-path }}
        run: |
          set -euo pipefail

          case "$MANIFEST_PATH" in
            ""|/*|..|../*|*/../*|*/..)
              echo "manifest-path must stay within the repository" >&2
              exit 2
              ;;
          esac

          before_scope="$GITHUB_WORKSPACE/.deploydiff/before"
          after_scope="$GITHUB_WORKSPACE/.deploydiff/after"
          mkdir -p "$before_scope" "$after_scope"

          git -C after fetch --no-tags --depth=1 origin "$BASE_SHA"

          candidates=0
          while IFS= read -r -d '' file; do
            lowercase=${file,,}
            case "$lowercase" in
              *.yaml|*.yml) ;;
              *) continue ;;
            esac

            has_kind=false
            for state in before after; do
              source="$GITHUB_WORKSPACE/$state/$file"
              if [[ -f "$source" && ! -L "$source" ]] && grep -Eq '^kind:[[:space:]]*[^[:space:]#]+' "$source"; then
                has_kind=true
              fi
            done
            if [[ "$has_kind" != true ]]; then
              continue
            fi

            for state in before after; do
              source="$GITHUB_WORKSPACE/$state/$file"
              if [[ -f "$source" && ! -L "$source" ]]; then
                target="$GITHUB_WORKSPACE/.deploydiff/$state/$file"
                mkdir -p "$(dirname "$target")"
                cp "$source" "$target"
              fi
            done
            candidates=$((candidates + 1))
          done < <(git -C after diff --no-renames --name-only -z "$BASE_SHA" "$HEAD_SHA" -- "$MANIFEST_PATH")

          echo "Selected $candidates changed Kubernetes manifest candidate(s)."
          echo "before=.deploydiff/before" >> "$GITHUB_OUTPUT"
          echo "after=.deploydiff/after" >> "$GITHUB_OUTPUT"

      - name: Compare deployment impact
        id: deploydiff
        uses: dheepan2/deploydiff@v0.1.12
        with:
          before: ${{ steps.scope.outputs.before }}
          after: ${{ steps.scope.outputs.after }}
          output: ${{ inputs.output }}
          discover-manifests: true

      - name: Create or update pull request comment
        if: ${{ inputs.comment && github.event.pull_request.head.repo.full_name == github.repository }}
        continue-on-error: true
        uses: actions/github-script@v8
        env:
          DEPLOYDIFF_REPORT: ${{ steps.deploydiff.outputs.report }}
          DEPLOYDIFF_OUTPUT: ${{ inputs.output }}
        with:
          github-token: ${{ github.token }}
          script: |
            const marker = '<!-- deploydiff-report -->';
            const report = (process.env.DEPLOYDIFF_REPORT || '').trim();
            const format = process.env.DEPLOYDIFF_OUTPUT || 'table';

            let hasChanges;
            if (format === 'json') {
              const parsed = JSON.parse(report);
              hasChanges = parsed.added.length > 0 || parsed.removed.length > 0 || parsed.modified.length > 0;
            } else if (format === 'yaml') {
              hasChanges = report !== 'added: []\nremoved: []\nmodified: []';
            } else {
              hasChanges = report !== 'No deployment changes.';
            }

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find(comment =>
              comment.user &&
              comment.user.login === 'github-actions[bot]' &&
              comment.body &&
              comment.body.includes(marker)
            );

            if (!hasChanges) {
              if (existing) {
                await github.rest.issues.deleteComment({ owner, repo, comment_id: existing.id });
              }
              core.info('No deployment changes; no pull request comment is needed.');
              return;
            }

            const limit = 60000;
            const rendered = report.length > limit
              ? `${report.slice(0, limit)}\n\n... report truncated; see the job summary for the complete output.`
              : report;
            const language = format === 'table' ? 'text' : format;
            const body = `${marker}\n## DeployDiff — Deployment Impact\n\n\`\`\`${language}\n${rendered}\n\`\`\``;

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
