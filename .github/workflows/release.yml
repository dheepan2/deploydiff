name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out release tag
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Test release source
        run: |
          go test ./...
          go vet ./...

      - name: Build release archives
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist

          for target in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64; do
            GOOS=${target%/*}
            GOARCH=${target#*/}
            archive="deploydiff_${VERSION}_${GOOS}_${GOARCH}"
            staging="dist/${archive}"

            mkdir -p "$staging"
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" go build \
              -trimpath \
              -ldflags "-s -w -X github.com/dheepan2/deploydiff/cmd.Version=${VERSION}" \
              -o "$staging/deploydiff" .
            cp LICENSE README.md "$staging/"
            tar -C dist -czf "dist/${archive}.tar.gz" "$archive"
            rm -rf "$staging"
          done

          (
            cd dist
            sha256sum *.tar.gz > checksums.txt
          )

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.ref_name }}
        run: |
          gh release create "$VERSION" \
            --title "DeployDiff ${VERSION}" \
            --generate-notes \
            dist/*.tar.gz dist/checksums.txt
