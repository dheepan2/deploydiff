name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run unit and functional tests
        run: go test ./...

      - name: Run static analysis
        run: go vet ./...

      - name: Build DeployDiff
        run: go build -o deploydiff .

      - name: Verify fixture comparison
        run: ./deploydiff compare ./testdata/compare/before ./testdata/compare/after

      - name: Build Docker action image
        run: docker build --tag deploydiff-action .

      - name: Verify Docker action image
        run: >-
          docker run --rm
          --volume "$PWD:/github/workspace"
          --env GITHUB_WORKSPACE=/github/workspace
          deploydiff-action
          ./testdata/compare/before
          ./testdata/compare/after
          table
