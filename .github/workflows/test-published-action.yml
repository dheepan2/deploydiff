name: Test Published Action

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  compare-fixtures:
    name: Compare fixture manifests through the public action
    runs-on: ubuntu-latest

    steps:
      - name: Check out fixture manifests
        uses: actions/checkout@v6

      - name: Run the published DeployDiff action
        id: deploydiff
        uses: dheepan2/deploydiff@v0.1.11
        with:
          before: testdata/compare/before
          after: testdata/compare/after
          output: table
